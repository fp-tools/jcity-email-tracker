# fly.toml app configuration file generated for email-tracker-rough-lantern-690 on 2026-06-05T14:43:42+09:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'email-tracker-rough-lantern-690'
primary_region = 'nrt'

[build]

[env]
  DATA_DIR = '/data'

[[mounts]]
  source = 'data'
  destination = '/data'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
